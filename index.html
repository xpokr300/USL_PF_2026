<!DOCTYPE html><html><head><meta charset='utf-8'><title>UŠL - Humanita</title>
<style>
        body { font-family: sans-serif; text-align: center; background: #ffffff; padding: 50px; }
        .menu-container { background: white; padding: 30px; border-radius: 10px; shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; min-width: 300px; }
        .btn { display: block; padding: 15px; margin: 10px 0; background: #0055aa; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #003366; }
        h1 { color: #333; }
        .footer { margin-top: 20px; font-size: 0.8em; color: #888; }
    </style></head><body>
<script>
    // Nastavení cílového data
    const countDownDate = new Date("March 28, 2026 10:00:00").getTime();

    // Aktualizace každou sekundu
    const x = setInterval(function() {

        // Získání aktuálního času
        const now = new Date().getTime();

        // Výpočet vzdálenosti mezi nyní a cílem
        const distance = countDownDate - now;

        // Výpočty pro dny, hodiny, minuty a sekundy
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // Vypsání výsledku do elementů
        document.getElementById("days").innerHTML = days;
        document.getElementById("hours").innerHTML = hours;
        document.getElementById("minutes").innerHTML = minutes;
        document.getElementById("seconds").innerHTML = seconds;

        // Pokud odpočet skončí
        if (distance < 0) {
            clearInterval(x);
            document.getElementById("countdown-container").innerHTML = "<h3 style='color:red;'>Kordy již řinčí!!!!!</h3>";
        }
    }, 1000);
</script>
<div id='countdown-container' style='text-align:center; font-family:sans-serif; margin: 20px 0; padding: 20px; border: 1px solid #004494; border-radius: 8px; background-color: #f9f9f9;'>
  <h3 style='margin-top:0;'>Turnaj začíná za:</h3>
  <div id='timer' style='font-size: 1.5em; font-weight: bold; color: #004494;'>
<div style='text-align:center; font-family:sans-serif; font-size: 2.5em; font-weight: 800; color: #004494; margin: 20px 0; letter-spacing: -1px;'>
    <span id='days'>00</span><span style='font-size: 0.4em; color: #666; margin-right: 10px;'>d</span>
    <span id='hours'>00</span><span style='font-size: 0.4em; color: #666; margin-right: 10px;'>h</span>
    <span id='minutes'>00</span><span style='font-size: 0.4em; color: #666; margin-right: 10px;'>m</span>
    <span id='seconds'>00</span><span style='font-size: 0.4em; color: #666;'>s</span>
</div>
</div>
